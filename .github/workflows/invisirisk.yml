          Invoke-WebRequest -Uri $url -OutFile Az.KeyVault.6.4.3.nupkg

      - name: Download Az.Compute package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/Az.Compute/11.4.0"
          Invoke-WebRequest -Uri $url -OutFile Az.Compute.11.4.0.nupkg

      - name: Download PowerShellGet package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/PowerShellGet/2.2.5"
          Invoke-WebRequest -Uri $url -OutFile PowerShellGet.2.2.5.nupkg

      - name: Download powershell-yaml package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/powershell-yaml/0.4.12"
          Invoke-WebRequest -Uri $url -OutFile powershell-yaml.0.4.12.nupkg

      - name: Download AzureRM.profile package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/AzureRM.profile/5.8.4"
          Invoke-WebRequest -Uri $url -OutFile AzureRM.profile.5.8.4.nupkg

      - name: Download Az.Automation package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/Az.Automation/1.11.2"
          Invoke-WebRequest -Uri $url -OutFile Az.Automation.1.11.2.nupkg

      - name: Download GetBIOS package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/GetBIOS/1.3.3"
          Invoke-WebRequest -Uri $url -OutFile GetBIOS.1.3.3.nupkg

      - name: Download Az.Advisor package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/Az.Advisor/3.0.0"
          Invoke-WebRequest -Uri $url -OutFile Az.Advisor.3.0.0.nupkg

      - name: Download Az.Network package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/Az.Network/7.26.0"
          Invoke-WebRequest -Uri $url -OutFile Az.Network.7.26.0.nupkg

      - name: Download TeamViewerPS package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/TeamViewerPS/2.4.0"
          Invoke-WebRequest -Uri $url -OutFile TeamViewerPS.2.4.0.nupkg

      - name: Download Az.Monitor package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/Az.Monitor/7.0.0"
          Invoke-WebRequest -Uri $url -OutFile Az.Monitor.7.0.0.nupkg

      - name: Download Az.AnalysisServices package
        shell: pwsh
        run: |
          $url = "https://www.powershellgallery.com/api/v2/package/Az.AnalysisServices/1.2.0"
          Invoke-WebRequest -Uri $url -OutFile Az.AnalysisServices.1.2.0.nupkg

      
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
          
  gather_analytics:
   runs-on: ubuntu-latest
   name: Gather Analytics
   needs: build
   if: always()
   steps:
   - name: Gather Status
     uses: invisirisk/pse-action@develop
     with:
      api_url: "https://app.dev.invisirisk.com"
      app_token: ${{ secrets.IR_API_KEY }}
      send_job_status: "true"
      debug: "true"
